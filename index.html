<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .box {
      text-align: center;
      background: rgba(0,0,0,0.3);
      padding: 30px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #ddd;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: #ff9800;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #e68900;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>🔥 الموقع شغال</h1>
    <p>إذا تشوف هذه الصفحة، GitHub Pages شغال تمام</p>
    <button onclick="alert('تمام 100%')">جربني</button>
  </div>

</body>
</html>
